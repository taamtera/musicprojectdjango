{% extends "base.html" %}

{% block title %}Confirm Delete | Music Project{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto glass-panel p-8 mt-12 text-center">
    <h2 class="text-3xl font-bold mb-6 text-red-400">Confirm Deletion</h2>
    <p class="text-lg text-slate-300 mb-8">
        Are you sure you want to delete "{{ object }}"? This action cannot be undone.
    </p>
    <form method="post" class="space-x-4">
        {% csrf_token %}
        <a href="javascript:history.back()" class="inline-block px-6 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white font-medium transition-colors">
            Cancel
        </a>
        <button type="submit" class="px-6 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white font-medium shadow-lg transition-transform hover:scale-105">
            Yes, Delete
        </button>
    </form>
</div>
{% endblock %}
